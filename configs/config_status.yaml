# ============================================================
# DB1 状态数据块配置 (MBValueTemp)
# ============================================================
# 总大小: 56 字节
# 说明: 包含通信模块和所有传感器的通信状态
# 
# 状态位含义:
#   - DONE: 通信完成 (true=完成)
#   - BUSY: 正在通信 (true=繁忙)
#   - ERROR: 通信错误 (true=有错误)
#   - STATUS: 状态字 (Word)
# ============================================================

db_block:
  db_number: 1
  db_name: "MBValueTemp"
  total_size: 56
  description: "Modbus 通信状态数据块"

# 通信状态结构定义
status_modules:
  # 每个模块 4 字节: DONE(0.0) + BUSY(0.1) + ERROR(0.2) + STATUS(Word at 2.0)
  module_size: 4
  fields:
    - name: "done"
      display_name: "通信完成"
      data_type: "Bool"
      bit_offset: 0
      description: "true = 通信成功完成"
    - name: "busy"
      display_name: "正在通信"
      data_type: "Bool"
      bit_offset: 1
      description: "true = 正在进行通信"
    - name: "error"
      display_name: "通信错误"
      data_type: "Bool"
      bit_offset: 2
      description: "true = 发生通信错误"
    - name: "status"
      display_name: "状态码"
      data_type: "Word"
      byte_offset: 2
      description: "Modbus 状态字 (16#0 = 正常)"

# 设备状态映射
devices:
  # 初始化/通信模块状态 (offset 0-3)
  - device_id: "comm_module"
    device_name: "通信模块"
    plc_name: "MB_COMM_LOAD"
    start_offset: 0
    description: "第一个初始化代码段的运行状态 Baud9600"

  # 电表 0-5 的状态 (对应 DB2 的 6 个电表)
  - device_id: "pump_meter_1"
    device_name: "1号泵电表状态"
    plc_name: "DB_MASTER_ELEC_0"
    start_offset: 4
    data_device_id: "pump_meter_1"  # 关联 DB2 的数据

  - device_id: "pump_meter_2"
    device_name: "2号泵电表状态"
    plc_name: "DB_MASTER_ELEC_1"
    start_offset: 8
    data_device_id: "pump_meter_2"

  - device_id: "pump_meter_3"
    device_name: "3号泵电表状态"
    plc_name: "DB_MASTER_ELEC_2"
    start_offset: 12
    data_device_id: "pump_meter_3"

  - device_id: "pump_meter_4"
    device_name: "4号泵电表状态"
    plc_name: "DB_MASTER_ELEC_3"
    start_offset: 16
    data_device_id: "pump_meter_4"

  - device_id: "pump_meter_5"
    device_name: "5号泵电表状态"
    plc_name: "DB_MASTER_ELEC_4"
    start_offset: 20
    data_device_id: "pump_meter_5"

  - device_id: "pump_meter_6"
    device_name: "6号泵电表状态"
    plc_name: "DB_MASTER_ELEC_5"
    start_offset: 24
    data_device_id: "pump_meter_6"

  # 电表 6-11 预留 (当前 DB2 没有对应数据)
  - device_id: "meter_reserved_7"
    device_name: "预留电表7状态"
    plc_name: "DB_MASTER_ELEC_6"
    start_offset: 28
    enabled: false

  - device_id: "meter_reserved_8"
    device_name: "预留电表8状态"
    plc_name: "DB_MASTER_ELEC_7"
    start_offset: 32
    enabled: false

  - device_id: "meter_reserved_9"
    device_name: "预留电表9状态"
    plc_name: "DB_MASTER_ELEC_8"
    start_offset: 36
    enabled: false

  - device_id: "meter_reserved_10"
    device_name: "预留电表10状态"
    plc_name: "DB_MASTER_ELEC_9"
    start_offset: 40
    enabled: false

  - device_id: "meter_reserved_11"
    device_name: "预留电表11状态"
    plc_name: "DB_MASTER_ELEC_10"
    start_offset: 44
    enabled: false

  - device_id: "meter_reserved_12"
    device_name: "预留电表12状态"
    plc_name: "DB_MASTER_ELEC_11"
    start_offset: 48
    enabled: false

  # 压力表状态
  - device_id: "pump_pressure"
    device_name: "压力表状态"
    plc_name: "DB_MASTER_PRESS"
    start_offset: 52
    data_device_id: "pump_pressure"

# 状态判断规则
status_rules:
  # 设备通信状态定义
  comm_ok:
    condition: "done == true && error == false"
    display: "通信正常"
    level: "normal"
  
  comm_busy:
    condition: "busy == true"
    display: "正在通信"
    level: "info"
  
  comm_error:
    condition: "error == true"
    display: "通信错误"
    level: "error"
  
  comm_timeout:
    condition: "done == false && busy == false && error == false"
    display: "未响应"
    level: "warning"
