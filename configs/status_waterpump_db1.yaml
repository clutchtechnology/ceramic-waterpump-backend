# ============================================================
# DB1 状态数据块配置 (MBValueTemp) - Master Status
# ============================================================
# 对应 PLC DB1 "MBValueTemp"
# 包含 Modbus 主站指令块的状态 (Done, Busy, Error, Status)
#
# 结构 (4字节):
#   - Done:   Bool (Byte 0, Bit 0)
#   - Busy:   Bool (Byte 0, Bit 1)
#   - Error:  Bool (Byte 0, Bit 2)
#   - Status: Word (Byte 2)
# ============================================================

db_block:
  db_number: 1
  db_name: "MBValueTemp"
  total_size: 80
  description: "Modbus 主站通信状态数据块 (Master Instruction Status)"

# 主站状态模块定义
status_module:
  module_size: 4
  fields:
    - name: "done"
      display_name: "完成标志"
      data_type: "Bool"
      byte_offset: 0
      bit_offset: 0
      description: "true = 上一次作业已完成"
      
    - name: "busy"
      display_name: "忙碌标志"
      data_type: "Bool"
      byte_offset: 0
      bit_offset: 1
      description: "true = 作业正在处理中"
      
    - name: "error"
      display_name: "错误标志"
      data_type: "Bool"
      byte_offset: 0
      bit_offset: 2
      description: "true = 作业出错"
    
    - name: "status"
      display_name: "状态码"
      data_type: "Word"
      byte_offset: 2
      description: "错误代码或状态信息"

# 设备映射表
devices:
  # ------------------------------------------------
  # 系统及通信负载
  # ------------------------------------------------
  - device_id: "status_master_load"
    device_name: "主站通信负载"
    plc_name: "MB_COMM_LOAD"
    start_offset: 0

