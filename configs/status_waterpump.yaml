# ============================================================
# DB3 状态数据块配置 (DataState)
# ============================================================
# 总大小: 52 字节 (13个状态模块 × 4字节)
# 说明: 包含12个电表通信状态 + 1个压力表通信状态
# 
# 每个状态模块结构 (4字节):
#   - Error: Bool (Byte 0, Bit 0) - 通信错误标志
#   - Status: Word (Byte 2-3) - 状态码 (16#0 = 正常)
# ============================================================

db_block:
  db_number: 3
  db_name: "DataState"
  total_size: 52
  description: "Modbus 通信状态数据块"

# 状态模块定义
status_module:
  module_size: 4
  fields:
    - name: "error"
      display_name: "通信错误"
      data_type: "Bool"
      byte_offset: 0
      bit_offset: 0
      description: "true = 发生通信错误"
    - name: "status"
      display_name: "状态码"
      data_type: "Word"
      byte_offset: 2
      description: "Modbus 状态字 (16#0 = 正常)"

# 设备状态映射
devices:
  # ============================================================
  # 电表状态 (12个, 对应 DB2 的 6 个电表 + 6 个预留)
  # ============================================================
  - device_id: "status_meter_1"
    device_name: "1号泵电表状态"
    plc_name: "ElectricityMeter_0"
    start_offset: 0
    data_device_id: "pump_meter_1"
    enabled: true

  - device_id: "status_meter_2"
    device_name: "2号泵电表状态"
    plc_name: "ElectricityMeter_1"
    start_offset: 4
    data_device_id: "pump_meter_2"
    enabled: true

  - device_id: "status_meter_3"
    device_name: "3号泵电表状态"
    plc_name: "ElectricityMeter_2"
    start_offset: 8
    data_device_id: "pump_meter_3"
    enabled: true

  - device_id: "status_meter_4"
    device_name: "4号泵电表状态"
    plc_name: "ElectricityMeter_3"
    start_offset: 12
    data_device_id: "pump_meter_4"
    enabled: true

  - device_id: "status_meter_5"
    device_name: "5号泵电表状态"
    plc_name: "ElectricityMeter_4"
    start_offset: 16
    data_device_id: "pump_meter_5"
    enabled: true

  - device_id: "status_meter_6"
    device_name: "6号泵电表状态"
    plc_name: "ElectricityMeter_5"
    start_offset: 20
    data_device_id: "pump_meter_6"
    enabled: true

  # 预留电表 (ElectricityMeter_6 到 ElectricityMeter_11)
  - device_id: "status_meter_7"
    device_name: "预留电表7状态"
    plc_name: "ElectricityMeter_6"
    start_offset: 24
    enabled: false

  - device_id: "status_meter_8"
    device_name: "预留电表8状态"
    plc_name: "ElectricityMeter_7"
    start_offset: 28
    enabled: false

  - device_id: "status_meter_9"
    device_name: "预留电表9状态"
    plc_name: "ElectricityMeter_8"
    start_offset: 32
    enabled: false

  - device_id: "status_meter_10"
    device_name: "预留电表10状态"
    plc_name: "ElectricityMeter_9"
    start_offset: 36
    enabled: false

  - device_id: "status_meter_11"
    device_name: "预留电表11状态"
    plc_name: "ElectricityMeter_10"
    start_offset: 40
    enabled: false

  - device_id: "status_meter_12"
    device_name: "预留电表12状态"
    plc_name: "ElectricityMeter_11"
    start_offset: 44
    enabled: false

  # ============================================================
  # 压力表状态
  # ============================================================
  - device_id: "status_pressure"
    device_name: "压力表状态"
    plc_name: "PRESS"
    start_offset: 48
    data_device_id: "pump_pressure"
    enabled: true
