db_mappings:
  # ============================================================
  # DB2 - 数据块 (传感器实际数据)
  # ============================================================
  - db_number: 2
    db_name: "Data_DB"
    total_size: 338
    config_file: "configs/config_waterpump.yaml"
    parser_class: "WaterpumpParser"
    enabled: true
    description: "6个电表 + 1个压力表 (真实PLC结构)"

  # ============================================================
  # DB3 - 状态数据块 (DataState - 通信状态)
  # ============================================================
  - db_number: 3
    db_name: "DataState"
    total_size: 52
    config_file: "configs/status_waterpump.yaml"
    parser_class: "StatusWaterpumpParser"
    enabled: true
    description: "12个电表状态 + 1个压力表状态"
