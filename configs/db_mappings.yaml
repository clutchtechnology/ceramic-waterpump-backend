db_mappings:
  # ============================================================
  # DB2 - 数据块 (传感器实际数据)
  # ============================================================
  - db_number: 2
    db_name: "Data_DB"
    total_size: 338
    config_file: "configs/config_waterpump_db2.yaml"
    parser_class: "DataDB2Parser"
    enabled: true
    description: "6个电表 + 1个压力表 (读到偏移量337)"

  # ============================================================
  # DB4 - 振动传感器数据块
  # ============================================================
  - db_number: 4
    db_name: "Vibration_DB"
    total_size: 228
    config_file: "configs/config_vib_4_db4.yaml"
    parser_class: "VibDB4Parser"
    enabled: true
    description: "6个振动传感器 (每个38字节)"

  # ============================================================
  # DB3 - 状态数据块 (DataState - 通信状态)
  # ============================================================
  - db_number: 3
    db_name: "DataState"
    total_size: 76
    config_file: "configs/status_waterpump_db3.yaml"
    parser_class: "StatusWaterpumpParser"
    enabled: true
    description: "12个电表状态 + 1个压力表状态 + 6个振动状态"

  # ============================================================
  # DB1 - 主站状态块 (Master Status)
  # ============================================================
  - db_number: 1
    db_name: "MBValueTemp"
    total_size: 80
    config_file: "configs/status_waterpump_db1.yaml"
    parser_class: "StatusWaterpumpMasterParser"
    enabled: true
    description: "主站指令块状态 (Done/Busy/Error/Status)"
